<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome | CPU Scheduling Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Landing Page Styles */
        .landing-section {
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .landing-background {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 0;
        }

        .motherboard-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: url('https://images.unsplash.com/photo-1518770660439-4636190af475?auto=format&fit=crop&q=80&w=2070');
            background-size: cover;
            background-position: center;
            filter: blur(8px) brightness(0.4) saturate(0.8);
        }

        .gradient-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(15, 15, 35, 0.95) 0%, rgba(26, 10, 62, 0.95) 50%, rgba(22, 0, 51, 0.95) 100%);
            top: 0;
            left: 0;
        }

        .bokeh-lights {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0.3;
            background: radial-gradient(circle at 20% 50%, rgba(0, 212, 255, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(124, 58, 237, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 40% 20%, rgba(255, 0, 110, 0.05) 0%, transparent 50%);
            pointer-events: none;
        }

        .landing-content {
            position: relative;
            z-index: 10;
            text-align: center;
            max-width: 900px;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: fadeInUp 0.8s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .cpu-icon-container {
            margin-bottom: 30px;
            animation: floatIcon 3s ease-in-out infinite;
        }

        .cpu-icon-container i {
            font-size: 80px;
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 20px rgba(0, 212, 255, 0.3));
        }

        @keyframes floatIcon {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-20px);
            }
        }

        .landing-title {
            font-size: 72px;
            font-weight: 700;
            color: white;
            margin: 20px 0 10px;
            letter-spacing: -1px;
            font-family: 'Inter', 'Roboto', sans-serif;
            line-height: 1.1;
            text-shadow: 0 10px 40px rgba(0, 212, 255, 0.2);
        }

        .landing-subtitle {
            font-size: 24px;
            color: var(--text-secondary);
            font-weight: 300;
            margin-bottom: 50px;
            letter-spacing: 0.5px;
            font-family: 'Inter', 'Roboto', sans-serif;
        }

        .badges-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 50px;
            width: 100%;
            max-width: 900px;
        }

        .glass-badge {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border: 1.5px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            transition: all 0.3s ease;
            cursor: pointer;
            color: white;
            font-family: 'Inter', 'Roboto', sans-serif;
        }

        .glass-badge i {
            font-size: 28px;
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .glass-badge span {
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        .glass-badge:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(0, 212, 255, 0.4);
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 212, 255, 0.2);
        }

        .enter-btn {
            background: white;
            color: #0f0f23;
            border: none;
            padding: 18px 50px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            transition: all 0.3s ease;
            box-shadow: 0 15px 40px rgba(0, 212, 255, 0.3);
            font-family: 'Inter', 'Roboto', sans-serif;
            letter-spacing: 0.5px;
        }

        .enter-btn i {
            font-size: 20px;
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            transition: transform 0.3s ease;
        }

        .enter-btn:hover {
            background: #f0f0f0;
            transform: scale(1.05);
            box-shadow: 0 20px 60px rgba(0, 212, 255, 0.4);
        }

        .enter-btn:hover i {
            transform: translateX(5px);
        }

        .enter-btn:active {
            transform: scale(0.98);
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .landing-title {
                font-size: 48px;
            }

            .landing-subtitle {
                font-size: 18px;
            }

            .cpu-icon-container i {
                font-size: 60px;
            }

            .badges-container {
                grid-template-columns: 1fr 1fr;
                gap: 15px;
            }

            .enter-btn {
                padding: 15px 40px;
                font-size: 16px;
            }
        }

        @media (max-width: 480px) {
            .landing-title {
                font-size: 36px;
            }

            .landing-subtitle {
                font-size: 16px;
            }

            .badges-container {
                grid-template-columns: 1fr;
            }

            .cpu-icon-container i {
                font-size: 50px;
            }
        }
    </style>
</head>
<body>
    <!-- Landing Page Section -->
    <section class="landing-section">
        <div class="landing-background">
            <div class="motherboard-bg"></div>
            <div class="gradient-overlay"></div>
            <div class="bokeh-lights"></div>
        </div>

        <div class="landing-content">
            <!-- CPU Icon -->
            <div class="cpu-icon-container">
                <i class="fas fa-microchip"></i>
            </div>

            <!-- Main Title -->
            <h1 class="landing-title">CPU Scheduling Algorithms</h1>

            <!-- Subtitle -->
            <h3 class="landing-subtitle">Modern Interactive Dashboard</h3>

            <!-- Glass Badges Grid -->
            <div class="badges-container">
                <div class="glass-badge">
                    <i class="fas fa-bolt"></i>
                    <span>7 Algorithms</span>
                </div>
                <div class="glass-badge">
                    <i class="fas fa-chart-line"></i>
                    <span>Real-time Analytics</span>
                </div>
                <div class="glass-badge">
                    <i class="fas fa-chart-bar"></i>
                    <span>Gantt Charts</span>
                </div>
                <div class="glass-badge">
                    <i class="fas fa-download"></i>
                    <span>Export Results</span>
                </div>
            </div>

            <!-- Enter Dashboard Button -->
            <button class="enter-btn" onclick="window.location.href='index.html'">
                Enter Dashboard
                <i class="fas fa-arrow-right"></i>
            </button>
        </div>
    </section>

</body>
</html>
